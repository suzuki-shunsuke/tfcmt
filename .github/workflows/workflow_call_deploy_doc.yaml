---
name: Deploy GitHub Pages (workflow_call)
on: workflow_call
permissions: {}
jobs:
  deploy-doc:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
    steps:
      - uses: suzuki-shunsuke/release-doc-action@a9e1ea0c4ca8c62906ca2a7fd3fa33325ee43ec9 # v0.1.0
        with:
          issue_number: 1724
          source_dir: website
          publish_dir: website/build
          destination_dir: docs
