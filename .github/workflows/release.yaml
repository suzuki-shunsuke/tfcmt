  push:
    tags: [v*]
jobs:
  release:
    uses: suzuki-shunsuke/go-release-workflow/.github/workflows/release.yaml@1cf29d7b17983b901021799b87a55d357cfff790 # v9.0.0
    with:
      go-version-file: go.mod
      aqua_version: v2.60.0
    permissions:
      contents: write
      id-token: write
      actions: read
      attestations: write
